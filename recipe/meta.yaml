{% set python_min = "3.10" %}
{% set name = "revel" %}
{% set version = "0.9.2.post1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/revel-{{ version }}.tar.gz
  sha256: 2ad9763aadb71abac80153ea8c7463f425b69f3b9517171825d6e37a4368ca48

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - blessed >=1.20.0
    - readchar >=4.1.0
    - colorama >=0.4.6
    - typing-extensions >=4.12.2

test:
  imports:
    - revel
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://gitlab.com/mad-moo/revel
  summary: Effortlessly spice up your terminal apps using colors, progressbars & more
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - thewchan
